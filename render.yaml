services:
  - type: web
    name: adaptive-api
    runtime: node
    rootDir: src/backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: GEMINI_API_KEY
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
